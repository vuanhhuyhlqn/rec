# Tiny CPU smoke-test PAAC fine-tuning config (mirrors smoke/pretrain.yaml).
_base_: ../base.yaml

run_name: smoke

data:
  max_title_len: 16
  max_history: 12
  max_train_impressions: 300
  max_dev_impressions: 100

model:
  plm:
    pretrained: false
    use_lora: true
    lora_r: 4
    small_config:
      hidden_size: 32
      num_hidden_layers: 2
      num_attention_heads: 4
      intermediate_size: 64
      max_position_embeddings: 32
      vocab_size: 30522
  model_dim: 32
  news_encoder: {num_layers: 1, num_heads: 4, dropout: 0.0}
  user_encoder: {num_layers: 1, num_heads: 4, dropout: 0.0}
  max_title_len: 16
  max_history_len: 12

checkpoint:
  dir: checkpoints

finetune:
  pretrained_ckpt: null      # set by the smoke test to the pretrain best dir
  negatives_per_pos: 1
  batch_size: 8
  num_workers: 0
  lambda1: 0.1
  lambda2: 0.1
  lambda3: 0.0001
  sa_ratio: 0.5
  cl_x_percent: 50.0
  cl_beta: 1.0
  cl_gamma: 0.5
  cl_tau: 0.1
  cl_dropout: 0.1
  cl_noise: 0.1
  lr: 0.001
  epochs: 1
  log_every: 5
  eval_every: 1
  max_eval_impressions: 50

