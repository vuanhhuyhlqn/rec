# Tiny CPU smoke-test pre-training config.
# Uses a small RANDOM BERT (pretrained: false) and a small data slice so the
# whole pipeline runs in seconds with no network / GPU.
_base_: ../base.yaml

run_name: smoke

data:
  max_title_len: 16
  max_history: 12
  min_seq_len: 3
  mask_prob: 0.3
  max_train_impressions: 300
  max_dev_impressions: 100

model:
  plm:
    pretrained: false
    use_lora: true
    lora_r: 4
    small_config:
      hidden_size: 32
      num_hidden_layers: 2
      num_attention_heads: 4
      intermediate_size: 64
      max_position_embeddings: 32
      vocab_size: 30522
  model_dim: 32
  news_encoder: {num_layers: 1, num_heads: 4, dropout: 0.0}
  user_encoder: {num_layers: 1, num_heads: 4, dropout: 0.0}
  max_title_len: 16
  max_history_len: 12

checkpoint:
  dir: checkpoints

pretrain:
  tau: 0.1
  tasks: [aap, mip, bsm]
  training:
    lr: 0.001
    epochs: 1
    batch_size: 8
    log_every: 5
    save_every: 1
    num_workers: 0
